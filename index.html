<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контроль доступа: Цифровая Крепость</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: #333;
        }
        #quiz-container { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 550px; 
            border: 1px solid #e0e0e0;
        }
        h2 { 
            color: #2c3e50; 
            font-size: 1.5em;
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .question { 
            font-size: 1.1em; 
            margin: 25px 0; 
            line-height: 1.5;
            text-align: left;
        }
        .options { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .option-btn { 
            padding: 15px; 
            font-size: 0.95em; 
            border: 1px solid #dcdde1; 
            border-radius: 4px; 
            background-color: #fff; 
            color: #2f3640; 
            cursor: pointer; 
            text-align: left;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) { 
            background-color: #f8f9fa; 
            border-color: #3498db;
            color: #3498db;
        }
        .option-btn:disabled { cursor: default; }
        
        /* Подсветка при выборе */
        .correct-choice { background-color: #ebfaef !important; border-color: #27ae60 !important; color: #1e8449 !important; }
        .wrong-choice { background-color: #fdf2f2 !important; border-color: #e74c3c !important; color: #922b21 !important; }

        #feedback { 
            margin-top: 25px; 
            padding: 15px;
            border-radius: 4px;
            font-size: 0.9em;
            line-height: 1.4;
            display: none;
        }
        .retry-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .retry-btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-content">
        <h2>Мастер Цифровой Крепости</h2>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "Какую роль выбрать для друга, который должен проверить ошибки в эссе, но не должен ничего удалять? ",
            options: ["Доступ по почте (Читатель)", "Доступ по ссылке (Редактор)", "Доступ по почте (Комментатор)"],
            correct: 2,
            tip: "Роль 'Комментатор' позволяет советовать правки, но не дает удалять основной текст. "
        },
        {
            question: "Как лучше всего указать имя победителя олимпиады в публичном отчете школы? ",
            options: ["Иванов Александр Сергеевич, 7-Б", "Инициалы: Иванов А., 7-Б", "ФИО и домашний адрес"],
            correct: 1,
            tip: "Минимизация данных (инициалы) защищает приватность ученика. "
        },
        {
            question: "В чем главное преимущество школьного Google Workspace перед соцсетями? ",
            options: ["Там больше визуальных эффектов", "Отсутствие рекламы и защищенный периметр", "Там можно регистрироваться в играх"],
            correct: 1,
            tip: "В образовательных средах данные не продаются рекламодателям. "
        },
        {
            question: "Что входит в реальные обязанности системного администратора? ",
            options: ["Чтение личной переписки учеников", "Защита сети от вирусов-шифровальщиков", "Рассылка спама пользователям"],
            correct: 1,
            tip: "Админ — это охранник, который бережет файлы от внешних атак. "
        },
        {
            question: "Вы делаете командный проект. Как безопаснее всего дать доступ коллегам? ",
            options: ["Открыть доступ по ссылке для всех", "Доступ по почте (Редактор) конкретным участникам", "Распечатать документ"],
            correct: 1,
            tip: "Адресный доступ по почте гарантирует, что внутри будут только «свои». "
        }
    ];

    let currentQuestion = 0;
    let errorsCount = 0;

    const questionEl = document.getElementById('question-text');
    const optionsEl = document.getElementById('options-container');
    const feedbackEl = document.getElementById('feedback');
    const quizContent = document.getElementById('quiz-content');

    function loadQuestion() {
        feedbackEl.style.display = "none";
        const q = quizData[currentQuestion];
        questionEl.textContent = q.question;
        optionsEl.innerHTML = "";
        
        q.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = option;
            btn.onclick = () => checkAnswer(index);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        const q = quizData[currentQuestion];
        const buttons = optionsEl.getElementsByTagName('button');
        
        for (let b of buttons) b.disabled = true;

        feedbackEl.style.display = "block";
        if (selected === q.correct) {
            buttons[selected].classList.add('correct-choice');
            feedbackEl.style.backgroundColor = "#ebfaef";
            feedbackEl.style.color = "#1e8449";
            feedbackEl.innerHTML = "<strong>Верно!</strong> " + q.tip;
        } else {
            errorsCount++;
            buttons[selected].classList.add('wrong-choice');
            buttons[q.correct].classList.add('correct-choice'); // Показываем правильный
            feedbackEl.style.backgroundColor = "#fdf2f2";
            feedbackEl.style.color = "#922b21";
            feedbackEl.innerHTML = "<strong>Ошибка.</strong> " + q.tip;
        }

        setTimeout(() => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 3500);
    }

    function showResults() {
        if (errorsCount === 0) {
            quizContent.innerHTML = `
                <h2>🎉 Идеальный результат!</h2>
                <p class="question">Ты отлично усвоил правила цифровой гигиены. Твоя Цифровая Крепость под надежной защитой! </p>
                <button class="retry-btn" onclick="location.reload()">Пройти еще раз</button>
            `;
        } else {
            quizContent.innerHTML = `
                <h2>📉 Нужно потренироваться</h2>
                <p class="question">Ты завершил тест, но допустил ошибки (всего: ${errorsCount}). Чтобы стать настоящим мастером доступов, попробуй пройти квиз еще раз без единой ошибки! </p>
                <button class="retry-btn" onclick="location.reload()">Начать заново</button>
            `;
        }
    }

    loadQuestion();
</script>

</body>
</html>
